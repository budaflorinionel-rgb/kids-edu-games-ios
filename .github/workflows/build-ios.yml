name: Build and Upload iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Install Apple API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8

    - name: Build Archive
      run: |
        cd "Kids Edu Games"
        xcodebuild archive \
          -project "Kids Edu Games.xcodeproj" \
          -scheme "Kids Edu Games" \
          -archivePath "$RUNNER_TEMP/KidsEduGames.xcarchive" \
          -destination "generic/platform=iOS" \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.API_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.ISSUER_ID }} \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }}

    - name: Export IPA
      run: |
        cat > exportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
        </dict>
        </plist>
        EOF
        
        xcodebuild -exportArchive \
          -archivePath "$RUNNER_TEMP/KidsEduGames.xcarchive" \
          -exportOptionsPlist exportOptions.plist \
          -exportPath "$RUNNER_TEMP/export" \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.API_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.ISSUER_ID }}

    - name: Upload to App Store Connect
      run: |
        xcrun altool --upload-app \
          --type ios \
          --file "$RUNNER_TEMP/export/Kids Edu Games.ipa" \
          --apiKey ${{ secrets.API_KEY_ID }} \
          --apiIssuer ${{ secrets.ISSUER_ID }}
